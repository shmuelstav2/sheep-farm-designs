<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת ניהול — הצעות עיצוב לאתר עדר כבשים</title>
<style>
  :root{
    --brand-900:#0F3D13;--brand-800:#164A1B;--brand-700:#1B5E20;--brand-600:#2E7D32;--brand-500:#43A047;
    --brand-100:#E1EFE2;--brand-50:#F1F7F1;
    --page:#F4F7F3;--surface:#FFFFFF;
    --ink-1:#161814;--ink-2:#4E544C;--ink-3:#82877E;
    --hairline:#E3E8E1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"Segoe UI",system-ui,"Arial Hebrew",Arial,sans-serif;
    background:var(--page);color:var(--ink-1);font-size:15px;line-height:1.5;
  }

  /* ---------- Header ---------- */
  .hero{
    background:linear-gradient(140deg,var(--brand-900),var(--brand-600));color:#fff;
    padding:38px 22px 46px;text-align:center;position:relative;overflow:hidden;
  }
  .hero::before,.hero::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.06)}
  .hero::before{width:340px;height:340px;top:-160px;inset-inline-start:-100px}
  .hero::after{width:280px;height:280px;bottom:-150px;inset-inline-end:-80px}
  .hero .mark{
    width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.14);
    display:inline-grid;place-items:center;margin-bottom:14px;position:relative;z-index:1;
  }
  .hero h1{font-size:clamp(22px,4.5vw,32px);font-weight:800;position:relative;z-index:1}
  .hero p{font-size:clamp(13px,2.6vw,15px);opacity:.88;margin-top:8px;position:relative;z-index:1;max-width:560px;margin-inline:auto}

  .wrap{max-width:1150px;margin:0 auto;padding:0 20px 50px}

  /* ---------- Cards ---------- */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:-24px;position:relative;z-index:2}
  @media (max-width:980px){.cards{grid-template-columns:1fr;max-width:520px;margin-inline:auto}}
  .card{
    background:var(--surface);border:1px solid var(--hairline);border-radius:18px;overflow:hidden;
    box-shadow:0 6px 22px rgba(15,61,19,.08);display:flex;flex-direction:column;
    transition:transform .15s, box-shadow .15s;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(15,61,19,.14)}
  .preview{
    height:215px;overflow:hidden;position:relative;background:#EDF1EC;border-bottom:1px solid var(--hairline);cursor:pointer;
  }
  .preview iframe{
    width:1280px;height:860px;border:0;transform-origin:top right;position:absolute;top:0;right:0;pointer-events:none;
  }
  .preview .hover-hint{
    position:absolute;inset:0;display:grid;place-items:center;background:rgba(15,61,19,0);transition:background .15s;
  }
  .preview .hover-hint span{
    opacity:0;transform:translateY(4px);transition:.15s;background:rgba(255,255,255,.95);color:var(--brand-800);
    font-weight:700;font-size:13px;padding:8px 18px;border-radius:99px;box-shadow:0 2px 10px rgba(0,0,0,.18);
  }
  .preview:hover .hover-hint{background:rgba(15,61,19,.22)}
  .preview:hover .hover-hint span{opacity:1;transform:none}
  .card-bd{padding:16px 18px 18px;display:flex;flex-direction:column;gap:9px;flex:1}
  .card-bd h3{font-size:16.5px;font-weight:800}
  .card-bd p{font-size:13px;color:var(--ink-2);flex:1}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:700;background:var(--brand-50);color:var(--brand-800);border:1px solid var(--brand-100);padding:3px 10px;border-radius:99px}
  .open-btn{
    margin-top:6px;border:none;border-radius:11px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;
    background:var(--brand-700);color:#fff;font-family:inherit;transition:background .12s;
  }
  .open-btn:hover{background:var(--brand-600)}

  .note{
    text-align:center;color:var(--ink-3);font-size:12.5px;margin-top:30px;
  }
  .note b{color:var(--ink-2)}

  /* ---------- Viewer ---------- */
  .viewer{
    position:fixed;inset:0;z-index:60;background:#10140F;display:none;flex-direction:column;
  }
  .viewer.on{display:flex}
  .vbar{
    display:flex;align-items:center;gap:10px;padding:10px 14px;background:#161C16;border-bottom:1px solid rgba(255,255,255,.1);
    color:#F2F4F1;flex-wrap:wrap;
  }
  .vbar .back{
    display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:none;color:#F2F4F1;
    border-radius:99px;padding:8px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .vbar .back:hover{background:rgba(255,255,255,.15)}
  .vbar .vtitle{font-size:14px;font-weight:700}
  .vbar .modes{margin-inline-start:auto;display:flex;background:rgba(255,255,255,.08);border-radius:99px;padding:3px}
  .vbar .modes button{
    border:none;background:transparent;color:#B9C1B6;font-size:12.5px;font-weight:700;padding:6px 14px;border-radius:99px;
    cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;
  }
  .vbar .modes button.active{background:#43A047;color:#08120A}
  .vstage{flex:1;display:grid;place-items:center;overflow:hidden;padding:0}
  .vframe{width:100%;height:100%;transition:width .25s,height .25s;background:#fff;display:flex}
  .vframe iframe{width:100%;height:100%;border:0;flex:1}
  .viewer.mobile .vstage{padding:18px 12px}
  .viewer.mobile .vframe{
    width:min(392px,96vw);height:min(806px,100%);border-radius:26px;overflow:hidden;
    border:8px solid #2A302A;box-shadow:0 12px 40px rgba(0,0,0,.5);
  }
  @media (max-width:600px){
    .vbar .modes{display:none}   /* on a real phone it's already mobile */
    .preview{height:185px}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="mark"><span style="width:100%;height:100%;display:grid;place-items:center;font-size:11px;font-weight:700;border:1.5px dashed rgba(255,255,255,.55);border-radius:inherit;color:rgba(255,255,255,.9)">לוגו</span></div>
  <h1>מערכת ניהול · הצעות עיצוב</h1>
  <p>שלוש הצעות עיצוב לאתר ניהול עדר כבשים — לפי מבנה המצגת, בהשראת בקר חזן. כל הצעה תומכת במחשב ובמובייל. לוחצים על הצעה כדי לצפות בה במסך מלא.</p>
</header>

<div class="wrap">
  <div class="cards" id="cards"></div>
  <p class="note"><b>טיפ:</b> בתצוגה המלאה אפשר לעבור בין מצב מחשב למצב מובייל בכפתורים שלמעלה. כל הנתונים להדגמה בלבד.</p>
</div>

<!-- Full-screen viewer -->
<div class="viewer" id="viewer">
  <div class="vbar">
    <button class="back" onclick="closeViewer()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 5 7 7-7 7"/></svg>
      חזרה לגלריה
    </button>
    <span class="vtitle" id="vtitle"></span>
    <div class="modes">
      <button id="mDesk" class="active" onclick="setMode('desktop')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2.5" y="4" width="19" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        מחשב
      </button>
      <button id="mMob" onclick="setMode('mobile')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="7" y="2.5" width="10" height="19" rx="2.5"/><path d="M11 18.5h2"/></svg>
        מובייל
      </button>
    </div>
  </div>
  <div class="vstage">
    <div class="vframe"><iframe id="vframe" title="תצוגת עיצוב"></iframe></div>
  </div>
</div>

<script>
  async function dec(b64){
    const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    const ds=new DecompressionStream('gzip');
    const stream=new Blob([bytes]).stream().pipeThrough(ds);
    return await new Response(stream).text();
  }
  let docs=[];
  const cards=document.getElementById('cards');
  (async()=>{
    docs=await Promise.all(DESIGNS.map(d=>dec(d.b64)));
    DESIGNS.forEach((d,i)=>{
      const el=document.createElement('article');el.className='card';
      el.innerHTML=`
        <div class="preview" onclick="openViewer(${i})">
          <iframe scrolling="no" tabindex="-1" title="${d.title} — תצוגה מקדימה"></iframe>
          <div class="hover-hint"><span>צפייה מלאה</span></div>
        </div>
        <div class="card-bd">
          <h3>${d.title}</h3>
          <p>${d.desc}</p>
          <div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <button class="open-btn" onclick="openViewer(${i})">פתיחת ההצעה</button>
          ${d.deep?'<a class="open-btn" style="display:block;text-align:center;text-decoration:none;background:var(--brand-100);color:var(--brand-800)" href="'+d.deep+'">תכנון מעמיק · כל המסכים ←</a>':''}
        </div>`;
      cards.appendChild(el);
      el.querySelector('iframe').srcdoc=docs[i];
    });
    fitPreviews();
  })();

  function fitPreviews(){
    document.querySelectorAll('.preview').forEach(p=>{
      const f=p.querySelector('iframe');
      f.style.transform='scale('+(p.clientWidth/1280)+')';
    });
  }
  window.addEventListener('resize',fitPreviews);

  const viewer=document.getElementById('viewer'),vframe=document.getElementById('vframe'),
        vtitle=document.getElementById('vtitle'),mDesk=document.getElementById('mDesk'),mMob=document.getElementById('mMob');
  function openViewer(i){
    vtitle.textContent=DESIGNS[i].title;
    vframe.srcdoc=docs[i];
    viewer.classList.add('on');
    document.body.style.overflow='hidden';
  }
  function closeViewer(){
    viewer.classList.remove('on');
    vframe.srcdoc='';
    document.body.style.overflow='';
  }
  function setMode(m){
    viewer.classList.toggle('mobile',m==='mobile');
    mDesk.classList.toggle('active',m==='desktop');
    mMob.classList.toggle('active',m==='mobile');
  }
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeViewer();});
</script>
</body>
